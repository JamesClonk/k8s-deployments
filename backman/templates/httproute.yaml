#@ load("@ytt:data", "data")
#@ load("@ytt:assert", "assert")
#@ load("_ytt.lib.yaml", "labels")

#@ if len(data.values.configuration.ingress.domains) == 0 or len(data.values.configuration.ingress.domains[0]) == 0 or data.values.configuration.ingress.domains[0] == "example.org":
#@  assert.fail("configuration.ingress.domain is missing or invalid")
#@ end
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backman
  namespace: backman
  labels: #@ labels("httproute")
spec:
  parentRefs:
  - name: envoy-gateway
    namespace: envoy-gateway-system
    sectionName: backman
  hostnames:
  #@ for/end host in data.values.configuration.ingress.domains:
  - #@ "backman." + host
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: backman
      port: 8080
    matches:
    - path:
        type: PathPrefix
        value: /

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: backman
  namespace: backman
  labels: #@ labels("security-policy")
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: backman
  oidc:
    provider:
      issuer: https://dex.jamesclonk.io/dex # TODO: template via plato!!!
    clientID: envoy-gateway
    clientSecret:
      name: backman-oidc-client-secret
    redirectURL: https://backman.jamesclonk.io/oauth2/callback # TODO: template via plato!!!
    logoutPath: /logout

---
apiVersion: v1
kind: Secret
metadata:
  name: backman-oidc-client-secret
  namespace: backman
  labels: #@ labels("oidc-secret")
type: Opaque
stringData:
  client-secret: #@ data.values.secrets.dex.oidc_client_secret
